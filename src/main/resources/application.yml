spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  security:
    jwt:
      secret-key: ${TTT_JWT_SECRET}
      expiration: 86400000 # 1 day
    oauth2:
      client:
        registration:
          google:
            client-id: ${TTT_GOOGLE_CLIENT_ID}
            client-secret: ${TTT_GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
