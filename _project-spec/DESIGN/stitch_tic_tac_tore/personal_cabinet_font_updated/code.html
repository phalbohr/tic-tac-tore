<body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Bar Component -->
<header class="bg-[#1f1b19]/80 backdrop-blur-xl text-[#a1d494] font-headline tracking-tight docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-6 py-3">
<div class="flex items-center justify-between w-full">
<div class="flex items-center w-10">
<button class="hover:opacity-80 transition-opacity active:scale-95 active:duration-100 flex items-center justify-center">
<span class="material-symbols-outlined text-[#ebe0dd] text-xl">home</span>
</button>
</div>
<h1 class="text-lg font-bold text-[#ebe0dd] tracking-tight text-center flex-1 whitespace-nowrap">Personal Cabinet</h1>
<div class="flex items-center justify-end w-10">
<button class="hover:opacity-80 transition-opacity active:scale-95 active:duration-100 flex items-center justify-center">
<span class="material-symbols-outlined text-[#ebe0dd] text-xl">arrow_back</span>
</button>
</div>
</div>
</header>
<main class="w-full max-w-md px-6 py-4 flex-grow space-y-4">
<!-- Avatar Section -->
<section class="flex flex-col items-center">
<div class="relative group">
<div class="w-24 h-24 rounded-xl overflow-hidden editorial-shadow border-4 border-surface-container-highest">
<img class="w-full h-full object-cover" data-alt="professional portrait of a man looking thoughtfully sideways with warm golden hour lighting and bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1EpMFm1K9OeybX1o5As0e8JU03UZV_xZx0JFDHI5IidXL--uDOfXyEF9bLxD-kt8HA53BUDxmvQovRHf88OBoHaH5y83fsjNqhSvfIJd7u3ry4tVtUx9SXEMUvpaHypt05tyGNug8fOUgXDn0VnQe7gT9HInsWOMqlQnzTBlqV3Q2Kcvos8A3Xm58wEQXOgcWcvauZOIaK1_nB6kjJIQco2CHR-n6SX1szg9bRelYKF4oh1hmPI9IkjNSyEYw64ChKfR61TNsR2M"/>
</div>
<button class="absolute -bottom-1 -right-1 bg-gradient-to-br from-[#a1d494] to-[#2d5a27] text-[#171211] p-2 rounded-lg shadow-lg active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">edit</span>
</button>
</div>
<div class="mt-3 text-center">
<h2 class="font-headline text-xl font-bold tracking-tight text-on-surface">Julian Forester</h2>
<p class="text-secondary font-headline text-[10px] uppercase tracking-[0.2em] mt-0.5 opacity-70">Master Tier Player</p>
</div>
</section>
<!-- Form Content -->
<div class="space-y-4">
<!-- Nickname Field -->
<div class="space-y-1.5">
<label class="font-headline text-[10px] font-bold uppercase tracking-widest text-primary/80 ml-1">Nickname</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-b-2 border-primary text-on-surface px-4 py-2.5 rounded-t-lg focus:outline-none focus:ring-0 font-headline text-base transition-all" placeholder="Enter nickname" type="text" value="Julian_Foos_92"/>
</div>
<p class="text-[9px] text-on-surface-variant font-headline italic flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-[12px]">info</span>
                    Can only be changed once a month
                </p>
</div>
<!-- Language Selection -->
<div class="space-y-1.5">
<label class="font-headline text-[10px] font-bold uppercase tracking-widest text-primary/80 ml-1">Language Selection</label>
<div class="flex gap-2 p-1 bg-surface-container-low rounded-xl">
<button class="flex-1 py-2 px-3 rounded-lg bg-gradient-to-br from-[#a1d494] to-[#2d5a27] text-[#171211] font-bold text-xs transition-all flex items-center justify-center gap-2 font-headline">
<span class="material-symbols-outlined text-xs">language</span>
                        English
                    </button>
<button class="flex-1 py-2 px-3 rounded-lg text-on-surface/60 font-semibold text-xs hover:text-on-surface transition-all flex items-center justify-center gap-2 font-headline">
                        Deutsch
                    </button>
</div>
</div>
<!-- Preferences (Editorial Style) -->
<div class="pt-1 space-y-3">
<div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-surface-container-highest flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-xl">notifications</span>
</div>
<div>
<p class="text-xs font-bold text-on-surface font-headline">Push Notifications</p>
<p class="text-[9px] text-on-surface-variant uppercase tracking-tighter font-headline">Match Alerts &amp; News</p>
</div>
</div>
<div class="w-10 h-5 bg-primary-container rounded-full relative p-0.5">
<div class="w-4 h-4 bg-primary rounded-full absolute right-0.5"></div>
</div>
</div>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="w-full max-w-md px-6 pb-6 pt-2">
<button class="w-full py-3.5 rounded-xl bg-gradient-to-br from-[#a1d494] to-[#2d5a27] text-[#171211] font-headline font-extrabold uppercase tracking-[0.2em] shadow-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-3">
            Confirm Changes
            <span class="material-symbols-outlined font-bold">check_circle</span>
</button>
<p class="text-center mt-3 text-[9px] text-on-surface-variant font-headline uppercase tracking-widest opacity-40">
            Tic-Tac-Tore v2.4.0 • Clubhouse Edition
        </p>
</footer>
