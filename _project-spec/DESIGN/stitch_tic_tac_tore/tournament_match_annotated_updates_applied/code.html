<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-container-high": "#2e2927",
            "surface-dim": "#171211",
            "surface-container": "#231f1d",
            "tertiary-fixed": "#ffe084",
            "primary-fixed": "#bcf0ae",
            "outline-variant": "#42493e",
            "on-tertiary": "#3c2f00",
            "primary": "#a1d494",
            "tertiary-fixed-dim": "#eec209",
            "error-container": "#93000a",
            "surface-container-highest": "#393431",
            "inverse-surface": "#ebe0dd",
            "surface-tint": "#a1d494",
            "primary-fixed-dim": "#a1d494",
            "on-tertiary-fixed": "#231b00",
            "tertiary-container": "#cea700",
            "background": "#171211",
            "on-primary-fixed": "#002201",
            "on-primary-container": "#9dd090",
            "on-surface-variant": "#c2c9bb",
            "primary-container": "#2d5a27",
            "on-tertiary-container": "#4e3e00",
            "on-primary": "#0a3909",
            "tertiary": "#efc209",
            "surface-container-low": "#1f1b19",
            "on-tertiary-fixed-variant": "#574500",
            "secondary-fixed": "#ffdbd1",
            "on-surface": "#ebe0dd",
            "surface-container-lowest": "#110d0c",
            "on-secondary-fixed": "#3a0a00",
            "on-primary-fixed-variant": "#23501e",
            "surface-variant": "#393431",
            "secondary": "#ffb59f",
            "secondary-fixed-dim": "#ffb59f",
            "on-error": "#690005",
            "outline": "#8c9387",
            "inverse-on-surface": "#352f2d",
            "inverse-primary": "#3b6934",
            "on-background": "#ebe0dd",
            "on-secondary-fixed-variant": "#7c2e15",
            "surface": "#171211",
            "on-secondary-container": "#ffa084",
            "on-error-container": "#ffdad6",
            "surface-bright": "#3e3836",
            "on-secondary": "#5d1802",
            "secondary-container": "#7f3017",
            "error": "#ffb4ab"
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Space Grotesk"],
            "label": ["Space Grotesk"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      min-height: 100dvh;
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#171211] text-on-surface selection:bg-primary/30">
<!-- Header -->
<header class="sticky top-0 z-40 bg-[#171211] flex justify-between items-center w-full px-4 h-16 border-b border-white/5">
<button class="p-2 text-on-surface" style="">
<span class="material-symbols-outlined" data-icon="home" style="">home</span>
</button>
<div class="font-bold tracking-tight text-white" style="">
      Tournaments</div>
<button class="p-2 text-on-surface" style="">
<span class="material-symbols-outlined" data-icon="arrow_back" style="">arrow_back</span>
</button>
</header>
<main class="max-w-xl mx-auto px-6 py-10 space-y-8">
<!-- Tournament List -->
<div class="space-y-4">
<!-- Card 1 -->
<div class="bg-surface-container-low p-6 rounded-xl border border-white/5">
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="text-xl font-bold text-white mb-1" style="">The Wooden Road Classic</h2>
<div class="flex gap-4 text-sm">
<span class="text-primary" style="">9 Matches to play</span>
<span class="text-on-surface-variant" style="">Best of 3</span>
</div>
</div>
</div>
<button class="w-full py-3 mt-2 rounded-lg bg-primary text-[#0a3909] font-bold text-sm tracking-widest uppercase transition-opacity hover:opacity-90" style="">
        Select
      </button>
</div>
<!-- Card 2 -->
<div class="bg-surface-container-low p-6 rounded-xl border border-white/5">
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="text-xl font-bold text-white mb-1" style="">Founder's Cup</h2>
<div class="flex gap-4 text-sm">
<span class="text-primary" style="">5 Matches to play</span>
<span class="text-on-surface-variant" style="">Best of 5</span>
</div>
</div>
</div>
<button class="w-full py-3 mt-2 rounded-lg border border-primary/30 text-primary font-bold text-sm tracking-widest uppercase hover:bg-primary/5 transition-colors" style="">
        Select
      </button>
</div>
<!-- Card 3 -->
<div class="bg-surface-container-low p-6 rounded-xl border border-white/5">
<div class="flex justify-between items-start mb-4">
<div>
<h2 class="text-xl font-bold text-white mb-1" style="">Rookie Rumble</h2>
<div class="flex gap-4 text-sm">
<span class="text-primary" style="">16 Matches to play</span>
<span class="text-on-surface-variant" style="">Single Set</span>
</div>
</div>
</div>
<button class="w-full py-3 mt-2 rounded-lg border border-primary/30 text-primary font-bold text-sm tracking-widest uppercase hover:bg-primary/5 transition-colors" style="">
        Select
      </button>
</div>
</div>
</main>
<!-- Bottom Nav -->
</body></html>
