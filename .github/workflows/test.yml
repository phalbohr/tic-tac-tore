# GitHub Actions CI/CD Pipeline for Tic-Tac-Tore
# Generated by BMad TEA Agent - Test Architect Module
# Optimized for: Parallel Sharding, Burn-In Loop, Fullstack (Java/Node)
# Stack: fullstack | Framework: Maven / Playwright / Vitest

name: Test Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly burn-in on Sundays at 2 AM UTC
    - cron: "0 2 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend Stage: Build and Test Java Application
  backend:
    name: Backend (Java 21)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        run: mvn clean verify

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: target/site/jacoco/
          retention-days: 30

  # Frontend Stage: Lint, Type-Check, and Unit Test
  frontend-unit:
    name: Frontend Unit & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Determine Node version
        id: node-version
        run: |
          if [ -f frontend/.nvmrc ]; then
            echo "value=$(cat frontend/.nvmrc)" >> "$GITHUB_OUTPUT"
            echo "Using Node from .nvmrc"
          else
            echo "value=24.6.0" >> "$GITHUB_OUTPUT"
            echo "Using default Node 24.6.0"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.value }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Type-Check
        working-directory: frontend
        run: npm run type-check

      - name: Run Unit Tests
        working-directory: frontend
        run: npm run test:unit -- --run

  # E2E Stage: Consolidated Playwright tests for stability
  # NOTE: Re-evaluate sharding (matrix) when test suite exceeds ~50 tests or 10 min duration.
  frontend-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend-unit]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.6.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # Burn-in stage - Flaky test detection for E2E
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: frontend-e2e
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.6.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run burn-in loop (10 iterations)
        working-directory: frontend
        run: |
          echo "🔥 Starting burn-in loop - detecting flaky tests"
          for i in {1..10}; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔥 Burn-in iteration $i/10"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            npm run test:e2e || exit 1
          done
          echo "✅ Burn-in complete - no flaky tests detected"

      - name: Upload burn-in failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 30

  # Report stage - Aggregate results
  report:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit, frontend-e2e, burn-in]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Tic-Tac-Tore Quality Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend (Java)**: ${{ needs.backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend (Unit/Lint)**: ${{ needs.frontend-unit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend (E2E)**: ${{ needs.frontend-e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Burn-in (Flakiness)**: ${{ needs.burn-in.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.burn-in.result }}" == "failure" ]; then
            echo "⚠️ **Flaky tests detected in PR** - Please investigate artifacts." >> $GITHUB_STEP_SUMMARY
          fi
