<body class="bg-background text-on-background font-body select-none overflow-hidden h-[390px] w-[884px]">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#171211]/80 backdrop-blur-xl bg-gradient-to-b from-[#1f1b19] to-transparent flex justify-between items-center px-6 h-14">

</div>
<h1 class="font-headline tracking-tight uppercase text-lg font-bold text-[#ebe0dd] mt-1">

<!-- Players & Swap Positions (Floating over the table) -->
<div class="absolute inset-x-8 inset-y-16 flex justify-between pointer-events-none">
<!-- Left Side (Team A Top / Team B Bottom) -->
<div class="flex flex-col justify-between items-center w-24 pointer-events-auto">
<!-- Player A1 -->
<div class="group flex flex-col items-center">
<div class="w-14 h-14 rounded-full border-2 border-secondary overflow-hidden bg-surface-container-highest shadow-lg transition-transform group-active:scale-90">

<span class="font-headline text-[9px] font-bold tracking-tighter text-on-surface">SWAP POSITIONS</span>
</button>
<!-- Player B1 -->

<span class="font-headline text-[10px] text-tertiary mt-1 tracking-widest font-bold mb-1">DEFENSE B</span>

<img alt="Player portrait" class="w-full h-full object-cover" data-alt="Portrait of a male player looking sharp, warm lighting reminiscent of a high-end clubhouse lounge" src="https://lh3.googleusercontent.com/aida-public/AB6AXuATsT759mNeSNwH5pN_EJg7pypqwq96ZaTrx-tv-IApt71zgy9Xas7mK1HQll31ldRxdyejSOckDqYdC-q7Nte5a26GhtErAnIg7LY2D_lk_QNuLAHNXx6sVcaNj4lR4ktsCaFpVbI8HHKpHl-hGmrL5jTcYuMLbgXlM0ZP0nsYprTsjw_pGf4-P4WwQLaI3ZT9FYCOwTOz__cUlnHWWzrOcaG7V8dmpY_EprnAFod-M5Deu9hHW30_wDEO5POLx4ZOEEGgtRM_K6g"/>

</div>
<span class="font-headline text-[10px] text-tertiary mt-1 tracking-widest font-bold">STRIKER B</span>
</div>

<button class="bg-surface-container-high/90 backdrop-blur-md px-3 py-1.5 rounded-full border border-outline-variant/30 flex items-center gap-2 active:scale-95 transition-all hover:bg-surface-container-highest">
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="swap_vert">swap_vert</span>
<span class="font-headline text-[9px] font-bold tracking-tighter text-on-surface">SWAP POSITIONS</span>

</div>
</div>
</div>

<div class="flex items-center gap-8">

<div class="flex flex-col items-center">

<span class="material-symbols-outlined" data-icon="add">add</span>

</div>
</div>
</div>

<div class="flex justify-center mt-2 pb-2">
<button class="group relative px-12 py-3 bg-gradient-to-br from-primary to-primary-container rounded-xl shadow-[0_8px_32px_rgba(45,90,39,0.3)] active:scale-95 transition-all overflow-hidden">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="relative font-headline text-sm font-extrabold tracking-widest text-on-primary">
          COMPLETE MATCH
        </span>
</button>
</div>
</main>
<!-- Ambient Light Effects -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-40 bg-gradient-to-t from-background via-transparent to-transparent opacity-40"></div>
<div class="fixed -bottom-32 -right-32 w-96 h-96 bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
