<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-40 h-40 rounded-full border border-on-surface/10"></div>

<div class="absolute top-[calc(50%-24px)] left-8">
<span class="font-space text-xs font-bold text-secondary tracking-[0.2em] uppercase">TEAM A</span>
</div>

<span class="font-space text-xs font-bold text-tertiary tracking-[0.2em] uppercase">TEAM B</span>
</div>

</button>
</div>

<div class="h-8 w-px bg-outline-variant/30"></div>
<div class="flex flex-col">
